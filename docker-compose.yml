services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - orion-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - orion-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - orion-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - orion-net

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yml:/etc/tempo.yaml
    ports:
      - "3200:3200"
    networks:
      - orion-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yaml
    ports:
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - tempo
    networks:
      - orion-net

  telemetry-service:
    image: alpine:latest
    container_name: telemetry-service
    command: ["/bin/sh", "/app/telemetry-service.sh"]
    volumes:
      - ./telemetry-service.sh:/app/telemetry-service.sh
    networks:
      - orion-net

  command-service:
    image: alpine:latest
    container_name: command-service
    command: >
      sh -c "
      apk add --no-cache netcat-openbsd &&
      sh /app/command-server.sh
      "
    volumes:
      - ./command-server.sh:/app/command-server.sh
    ports:
      - "6004:6004"
    networks:
      - orion-net

networks:
  orion-net:
    driver: bridge
